<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" /> <title>Legends: Daybreak Quest</title> <style> :root { --cream:#FBF4E9; --creamDeep:#F3E7D3; --ink:#4A3B32; --inkSoft:#8A7566; --mage:#8E6FB0; --mageDeep:#6F4F92; --mageSoft:#EDE3F7; --pink:#E9A8B4; --gold:#D9A441; --sage:#8FA982; --sageSoft:#E6EFDF; --card:#FFFDF8; --border:#E4D4BC; } * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; } html, body { margin:0; padding:0; background:var(--cream); color:var(--ink); font-family:'Nunito','Segoe UI',sans-serif; overscroll-behavior:none; } .disp { font-family:'Poppins','Segoe UI',sans-serif; } button { font-family:inherit; border:none; cursor:pointer; background:none; } textarea { font-family:'Nunito',sans-serif; } ::-webkit-scrollbar{ display:none; } @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} } .pulse { animation: pulse 1.4s ease-in-out infinite; } </style> </head> <body> <div id="app"></div> <script> /* ================= palette ================= */ const C = { cream:"#FBF4E9", creamDeep:"#F3E7D3", ink:"#4A3B32", inkSoft:"#8A7566", mage:"#8E6FB0", mageDeep:"#6F4F92", mageSoft:"#EDE3F7", pink:"#E9A8B4", gold:"#D9A441", sage:"#8FA982", sageSoft:"#E6EFDF", card:"#FFFDF8", border:"#E4D4BC", }; /* ================= world data ================= */ const PARTY = [ { id:"joel", name:"Joel", title:"The Steadfast", icon:"🛡️", color:C.mage, bio:"Your partner and shield. Never lets you fight alone.", passive:"+10% Max HP", unlockLv:1 }, { id:"aisyah", name:"Aisyah", title:"Sisterblade", icon:"⚔️", color:C.sage, bio:"Your sister, sharp-eyed and sharper-tongued.", passive:"+20% Gold found", unlockLv:1 }, { id:"mezstorm", name:"Mezstorm", title:"Stormsinger", icon:"✨", color:C.pink, bio:"Your other sister. Turns chaos into a song.", passive:"+15% XP earned", unlockLv:3 }, { id:"eliz", name:"Eliz", title:"Little Healer", icon:"❤️", color:C.pink, bio:"Your niece. Small hands, big heart.", passive:"Slow HP regen each call", unlockLv:4 }, { id:"senedra", name:"Senedra", title:"Swift Scout", icon:"⭐", color:C.gold, bio:"Your niece. Always finds the extra loot.", passive:"+chance of bonus material", unlockLv:6 }, { id:"zaki", name:"Zaki", title:"Young Blade", icon:"🔨", color:C.mageDeep, bio:"Your nephew, training hard to keep up.", passive:"+Attack power", unlockLv:8 }, { id:"soel", name:"Soel", title:"The Familiar", icon:"🐱", color:C.inkSoft, bio:"Grey and white, and completely in charge.", passive:"+Luck (crit chance)", unlockLv:10 }, ]; const MATERIALS = ["Moonherb", "Silver Dust", "Ember Shard", "Starlight Thread", "Slime Gel"]; const MATERIALS_REFINED = ["Herbal Extract", "Silver Ingot", "Ember Core", "Starlight Weave", "Gel Solvent"]; const CHARGE_CAP = 6; const CHARGE_REGEN_MS = 90 * 60 * 1000; const LOCATION_COOLDOWN_MS = 8 * 60 * 1000; const REST_COOLDOWN_MS = 3 * 60 * 60 * 1000; const WANDERING_MONSTERS = [ { name:"Wraithling", icon:"👻" }, { name:"Feed Sprite", icon:"🦋" }, { name:"Notification Gnat", icon:"🪰" }, { name:"Doubt Wisp", icon:"💭" }, { name:"Idle Slime", icon:"🫧" }, ]; const LOCATIONS = [ { id:"forest", name:"Whispering Forest", icon:"🌲", unlockLv:1, flavor:[ "A patch of Moonherb glows faintly between the roots.", "The wraiths avoid this place. You take a slow breath.", "Something rustles overhead — just Soel, following at a distance.", ]}, { id:"market", name:"Market Row", icon:"🏪", unlockLv:1, flavor:[ "A trader waves you over, then just as quickly gets distracted.", "Aisyah's voice carries from a stall two rows down, haggling loudly.", "You pocket a few coins someone dropped near the fountain.", ]}, { id:"fountain", name:"Guildhall Fountain", icon:"🏛️", unlockLv:1, flavor:[ "Legends banners hang overhead, snapping gently in the wind.", "You toss a coin in. It doesn't come back, but you feel lighter.", "Mezstorm is humming something new here. You linger to listen.", ]}, { id:"lake", name:"Moonlit Lake", icon:"🌊", unlockLv:1, flavor:[ "The water is still enough to see the whole sky in it.", "Joel's usual spot on the dock is empty, but still warm.", "A Starlight Thread catches the light just beneath the surface.", ]}, { id:"watchtower", name:"Old Watchtower", icon:"⛰️", unlockLv:1, flavor:[ "From up here, the whole map feels smaller and kinder.", "Zaki left a practice sword leaning against the wall again.", "No wraiths reach this high. Just wind, and a little quiet.", ]}, { id:"ruins", name:"Sunken Ruins", icon:"🏺", unlockLv:5, flavor:[ "Old Legends banners, faded, half-buried in silt.", "Something valuable glints beneath the rubble.", "The quiet here feels older than the guild itself.", ]}, { id:"peak", name:"Frostpeak Summit", icon:"❄️", unlockLv:8, flavor:[ "The wind up here clears your head completely.", "You can see all five zones from this ridge.", "Frost-laced Starlight Thread grows only this high up.", ]}, { id:"grove", name:"Elder Grove", icon:"🌳", unlockLv:12, flavor:[ "The oldest tree here has watched the guild for generations.", "Soel refuses to leave once he's settled in the roots.", "Everything feels a little more possible in this grove.", ]}, ]; const ENCOUNTER_CYCLE = ["Gathering Day", "Crafting Day", "Boss Day", "Guild Day", "Rest Day"]; const ENEMIES = [ { id:"wraith", name:"Scroll Wraith", intro:"A Scroll Wraith flickers into being, feeding on wasted minutes.", hpMod:1 }, { id:"imp", name:"Notification Imp", intro:"A Notification Imp buzzes at the edge of your vision — all noise, no substance.", hpMod:0.85 }, { id:"serpent", name:"Feed Serpent", intro:"A Feed Serpent uncoils from an endless scroll, hungry for your attention.", hpMod:1.15 }, { id:"specter", name:"Doubt Specter", intro:"A Doubt Specter murmurs that you should just check one more thing.", hpMod:1 }, ]; const BOSSES = [ { id:"endless_scroll", name:"The Endless Scroll", minLv:1, intro:"The Endless Scroll unfurls before you — everything you were trying to avoid, given a shape.", hpMult:4.2, phaseLines:["It thins at the edges, but keeps trying to regenerate.", "Down to its last threads. It's losing its grip."] }, { id:"notif_king", name:"The Notification King", minLv:1, intro:"The Notification King rises, crowned in a hundred unread badges.", hpMult:4.5, phaseLines:["His crown flickers — a few badges finally clear.", "Nearly silent now. Just one left, blinking."] }, { id:"doomscroll_leviathan", name:"The Doomscroll Leviathan", minLv:10, intro:"The Doomscroll Leviathan rises from a feed that never bottoms out, coiled from a thousand half-read headlines.", hpMult:4.6, phaseLines:["Its coils slacken — the feed is running dry.", "One last loop. It knows it's almost out of scroll."] }, { id:"multitask_hydra", name:"The Multitasking Hydra", minLv:10, intro:"The Multitasking Hydra splits its attention six ways at once, and somehow finishes none of them.", hpMult:4.8, phaseLines:["Two heads have gone still, half-finished.", "Only one head keeps darting between tasks — tired, but stubborn."] }, { id:"burnout_wraithking", name:"The Burnout Wraith King", minLv:20, intro:"The Burnout Wraith King doesn't attack so much as insist you have nothing left to give. You disagree.", hpMult:5.0, phaseLines:["His crown of exhaustion dims — you're still standing.", "He's running on fumes now. So were you, once. Not today."] }, { id:"perfectionists_mirror", name:"The Perfectionist's Mirror", minLv:20, intro:"The Perfectionist's Mirror shows you every version of this that could've gone better. None of them are real.", hpMult:5.2, phaseLines:["The glass cracks — the reflection stops looking so certain.", "It's just glass now, catching light instead of doubt."] }, { id:"procrastination_titan", name:"The Procrastination Titan", minLv:30, intro:"The Procrastination Titan moves slowly, but it's been building momentum since long before you noticed it.", hpMult:5.5, phaseLines:["It stumbles — momentum was all it had.", "Down to its knees. Starting was always the hard part, for both of you."] }, { id:"inbox_devourer", name:"The Inbox Devourer", minLv:30, intro:"The Inbox Devourer swells with every unread thread, each one a little louder than the last.", hpMult:5.7, phaseLines:["Its swell recedes — a few threads finally closed.", "Nearly hollow now. Almost inbox zero. Almost."] }, { id:"overwhelm_colossus", name:"The Overwhelm Colossus", minLv:40, intro:"The Overwhelm Colossus is built from everything at once — every task, every ping, stacked into something enormous and loud.", hpMult:6.0, phaseLines:["It staggers — turns out 'everything at once' was never one thing.", "One piece left standing. You've been breaking this down the whole time."] }, { id:"midnight_scroll", name:"The Midnight Scroll", minLv:40, intro:"The Midnight Scroll only appears this late, whispering just one more, just one more, until the sky goes pale.", hpMult:6.2, phaseLines:["The whisper falters — the sky's already lightening.", "Nearly dawn. It can't survive daybreak, and neither can the excuse."] }, ]; function pickBossForLevel(level) { const bucket = level < 10 ? 1 : Math.floor(level/10) * 10; let pool = BOSSES.filter(b => b.minLv === bucket); if (!pool.length) pool = BOSSES.filter(b => b.minLv <= level); return pool[hashDay(today() + "-boss") % pool.length]; } const RECIPES = [ { id:"health_draught", type:"potion", name:"Health Draught", needs:{"Moonherb":2,"Silver Dust":1}, effect:"Restore 30 HP instantly", icon:"🧪" }, { id:"focus_elixir", type:"potion", name:"Focus Elixir", needs:{"Starlight Thread":1,"Ember Shard":1}, effect:"+2 bonus damage next Call", icon:"🧪" }, { id:"greater_health_draught", type:"potion", name:"Greater Health Draught", needs:{"Herbal Extract":1,"Silver Ingot":1}, effect:"Restore 60 HP instantly", icon:"🧪" }, { id:"refine_herb", type:"refine", name:"Refine Herbal Extract", needs:{"Moonherb":3}, produces:{material:"Herbal Extract", qty:1}, effect:"3 Moonherb → 1 Herbal Extract", icon:"🔥" }, { id:"refine_silver", type:"refine", name:"Refine Silver Ingot", needs:{"Silver Dust":3}, produces:{material:"Silver Ingot", qty:1}, effect:"3 Silver Dust → 1 Silver Ingot", icon:"🔥" }, { id:"refine_ember", type:"refine", name:"Refine Ember Core", needs:{"Ember Shard":3}, produces:{material:"Ember Core", qty:1}, effect:"3 Ember Shard → 1 Ember Core", icon:"🔥" }, { id:"refine_starlight", type:"refine", name:"Refine Starlight Weave", needs:{"Starlight Thread":3}, produces:{material:"Starlight Weave", qty:1}, effect:"3 Starlight Thread → 1 Starlight Weave", icon:"🔥" }, { id:"refine_gel", type:"refine", name:"Refine Gel Solvent", needs:{"Slime Gel":3}, produces:{material:"Gel Solvent", qty:1}, effect:"3 Slime Gel → 1 Gel Solvent", icon:"🔥" }, { id:"apprentice_staff", type:"equipment", slot:"weapon", name:"Apprentice Staff", needs:{"Ember Shard":2,"Silver Dust":2}, gold:30, effect:"+3 Attack", bonus:{atk:3}, icon:"🪄" }, { id:"woven_robe", type:"equipment", slot:"armor", name:"Woven Robe", needs:{"Slime Gel":3,"Starlight Thread":1}, gold:25, effect:"+15 Max HP", bonus:{hp:15}, icon:"🛡️" }, { id:"lucky_charm", type:"equipment", slot:"trinket", name:"Lucky Charm", needs:{"Moonherb":1,"Starlight Thread":2}, gold:40, effect:"+Crit chance", bonus:{luck:1}, icon:"💎" }, { id:"journeyman_staff", type:"equipment", slot:"weapon", name:"Journeyman Staff", needs:{"Ember Core":2,"Silver Ingot":1}, gold:60, requiresCrafted:"apprentice_staff", effect:"+7 Attack", bonus:{atk:7}, icon:"🪄" }, { id:"enchanted_robe", type:"equipment", slot:"armor", name:"Enchanted Robe", needs:{"Gel Solvent":2,"Starlight Weave":1}, gold:55, requiresCrafted:"woven_robe", effect:"+32 Max HP", bonus:{hp:32}, icon:"🛡️" }, { id:"radiant_charm", type:"equipment", slot:"trinket", name:"Radiant Charm", needs:{"Silver Ingot":1,"Starlight Weave":2}, gold:70, requiresCrafted:"lucky_charm", effect:"+2 Luck (bigger crit chance)", bonus:{luck:2}, icon:"💎" }, ]; const QUEST_CHAINS = [ { id:"chain_light", title:"First Light", icon:"🌅", steps:[ { desc:"Answer 3 Calls", goal:3, track:"totalCheckIns", reward:{gold:20,xp:15} }, { desc:"Reach a 5-day streak", goal:5, track:"streak", reward:{gold:30,xp:25} }, { desc:"Craft your first item", goal:1, track:"craftCount", reward:{gold:35,xp:30} }, ]}, { id:"chain_market", title:"Market Row Regular", icon:"🏪", steps:[ { desc:"Visit 2 different locations in one day", goal:2, track:"locationsToday", reward:{gold:20,xp:0} }, { desc:"Gather 5 Moonherb", goal:5, track:"mat:Moonherb", reward:{gold:25,xp:20} }, { desc:"Refine your first material", goal:1, track:"refineCount", reward:{gold:35,xp:30} }, ]}, { id:"chain_guild", title:"Guild Hall Regular", icon:"🏛️", steps:[ { desc:"Complete 3 Guild Days", goal:3, track:"guildDays", reward:{gold:35,xp:30} }, { desc:"Reach Level 5", goal:5, track:"level", reward:{gold:40,xp:0} }, { desc:"Defeat a Boss", goal:1, track:"bossesDefeated", reward:{gold:60,xp:50} }, ]}, ]; const MILESTONE_QUESTS = [ { id:"q_fullmoon", name:"The Full Moon", desc:"Answer 25 Calls total", goal:25, track:"totalCheckIns", reward:{gold:100,xp:80} }, { id:"q_bonded", name:"Bonded", desc:"Fully bond with any companion", goal:1, track:"maxBond", reward:{gold:50,xp:40} }, { id:"q_lv20", name:"Seasoned Mage", desc:"Reach Level 20", goal:20, track:"level", reward:{gold:150,xp:0} }, { id:"q_calls100", name:"Century of Calls", desc:"Answer 100 Calls total", goal:100, track:"totalCheckIns", reward:{gold:200,xp:150} }, { id:"q_streak30", name:"Unbroken", desc:"Reach a 30-day streak", goal:30, track:"streak", reward:{gold:180,xp:140} }, { id:"q_lv35", name:"Veteran of Daybreak", desc:"Reach Level 35", goal:35, track:"level", reward:{gold:280,xp:0} }, { id:"q_bosses10", name:"Boss Slayer", desc:"Defeat 10 bosses", goal:10, track:"bossesDefeated", reward:{gold:250,xp:200} }, { id:"q_calls250", name:"The Long Habit", desc:"Answer 250 Calls total", goal:250, track:"totalCheckIns", reward:{gold:350,xp:280} }, { id:"q_lv50", name:"Living Legend", desc:"Reach Level 50", goal:50, track:"level", reward:{gold:500,xp:0} }, { id:"q_bosses25", name:"Colossus Slayer", desc:"Defeat 25 bosses", goal:25, track:"bossesDefeated", reward:{gold:450,xp:350} }, ]; const TASK_POOL = [ { id:"t_calls2", desc:"Answer 2 Calls today", goal:2, calc: () => todayLog().count, reward:{gold:8,xp:6} }, { id:"t_roam2", desc:"Visit 2 different locations today", goal:2, calc: () => questValue("locationsToday"), reward:{gold:8,xp:0} }, { id:"t_make1", desc:"Craft or refine 1 item today", goal:1, calc: () => (state.dailyLog.crafted||0) + (state.dailyLog.refined||0), reward:{gold:10,xp:8} }, { id:"t_potion1", desc:"Use a potion today", goal:1, calc: () => state.dailyLog.potionsUsed||0, reward:{gold:6,xp:6} }, { id:"t_material3", desc:"Gather 3 materials today", goal:3, calc: () => state.dailyLog.materialsGathered||0, reward:{gold:9,xp:5} }, ]; const DAY_QUESTS = [ { id:"dq_lost_charm", title:"Eliz's Lost Charm", giver:"eliz", icon:"❤️", intro:'"I lost my charm somewhere near the lake — can you find it?"', type:"fetch", track:"mat:Starlight Thread", goal:1, complete:"You spot a glint by the shore and scoop it up. Eliz beams.", reward:{gold:15,xp:12} }, { id:"dq_zaki_practice", title:"Sparring with Zaki", giver:"zaki", icon:"🔨", intro:'"Wanna test my footwork? Answer just one Call with me today."', type:"fetch", track:"totalCheckInsToday", goal:1, complete:'He grins, out of breath. "Again tomorrow?"', reward:{gold:10,xp:15} }, { id:"dq_soel_nap", title:"Soel's Sunny Spot", giver:"soel", icon:"🐱", intro:"He wants his favorite napping spot — the Watchtower — visited and cleared of dust.", type:"fetch", track:"visit:watchtower", goal:1, complete:"Soel curls up there, one slow blink of thanks.", reward:{gold:10,xp:10} }, { id:"dq_mez_song", title:"Mezstorm's Missing Verse", giver:"mezstorm", icon:"✨", intro:'"I need quiet to finish this verse. Rest today instead of grinding?"', type:"fetch", track:"restToday", goal:1, complete:"She hums the finished line back to you. It's about you, a little.", reward:{gold:12,xp:12} }, { id:"dq_senedra_map", title:"Senedra's Treasure Map", giver:"senedra", icon:"⭐", intro:'"I drew a treasure map! Probably accurate. Explore 2 spots for me?"', type:"fetch", track:"locationsToday", goal:2, complete:'"Told you it\'d work!" she says, not looking at the map at all.', reward:{gold:14,xp:10} }, { id:"dq_aisyah_debt", title:"Aisyah's Market Debt", giver:"aisyah", icon:"⚔️", intro:'"Ugh, I owe the fruit stall 15 gold. Spot me? I\'m good for it."', type:"choice", options:[ { label:"Lend her the gold (-15g)", effect:{gold:-15,xp:12}, result:'She grins. "Knew I could count on you."' }, { label:"Tell her to handle it", effect:{xp:6}, result:'She laughs. "Fair enough. I\'ll figure it out."' }, ]}, { id:"dq_joel_choice", title:"Joel's Question", giver:"joel", icon:"🛡️", intro:'"Rough day or good one — talk about it, or just fight something?"', type:"choice", options:[ { label:"Talk it out", effect:{xp:15}, result:'"Thanks for telling me. I\'ve got you."' }, { label:"Just fight something", effect:{gold:15}, result:'"Say no more." He tosses you a potion worth of coin.' }, ]}, ]; const STORY_CHAPTERS = [ { id:"ch1", title:"The First Ember", icon:"🔥", unlockLv:1, pages:[ "Legends wasn't always a guild for keeping people afloat. It started smaller — a firelit table, five chairs, and a promise: whatever comes for you, we come too.", "You remember the day Joel put a Focus Charge in your hand and said, \"This one's yours now.\" You didn't know yet what it would hold back.", "The Scroll Wraiths were already here then, thin as smoke, easy to ignore. They're patient. They wait for tired hands.", "But so does the guild. And the guild doesn't blink first.", ], reward:{gold:10,xp:10} }, { id:"ch2", title:"Cracks in the Feed", icon:"📜", unlockLv:3, pages:[ "Mezstorm noticed it first — a hum under the market noise, low and constant, like something scrolling that never stops.", "\"It's getting louder,\" she said. \"Not because it's stronger. Because we're listening for it now.\"", "That's the trick of a Scroll Wraith: it doesn't grow until you feed it. Every ignored Call is a scrap it gets to keep.", "You started answering more Calls that week — not because you had to, but because you finally understood what you were choosing between.", ], reward:{gold:14,xp:12} }, { id:"ch3", title:"The Wraith That Doesn't Sleep", icon:"👻", unlockLv:5, pages:[ "Aisyah found the Sunken Ruins first, half by accident, chasing a merchant who owed her coin.", "\"There's something old down here,\" she said when she came back. \"Not dangerous. Just... tired. Like it forgot why it was still going.\"", "You went to see for yourself. The Ruins were quiet in a way the rest of the map wasn't — no wraiths, no noise, just dust settling on something that used to matter.", "Aisyah didn't say it, but you both knew: that's what waits for anything left unanswered long enough. You left with a little more Moonherb, and a little more resolve.", ], reward:{gold:16,xp:14} }, { id:"ch4", title:"Watchtower Vigil", icon:"⛰️", unlockLv:7, pages:[ "Zaki dragged a practice sword up the Watchtower stairs and refused to say why until you'd climbed all of them with him.", "\"Highest point on the map,\" he said, out of breath. \"Nothing reaches you up here. Not even the noise.\"", "You stood there a while, the whole guild's little world laid out below — Market Row, the Fountain, the Lake catching the last of the light.", "It occurred to you that this was the first time in weeks you'd stood still on purpose. Zaki grinned like he'd planned that part too.", ], reward:{gold:18,xp:16} }, { id:"ch5", title:"The Notification King's Shadow", icon:"👑", unlockLv:9, pages:[ "Word reached the guild hall before you did: something crowned in badges was gathering strength near the old signal towers.", "\"He feeds on the ping before the message,\" Mezstorm said. \"The dread of checking, more than what's actually there.\"", "Joel offered to face him alongside you. Aisyah offered gold for information instead — hire it out, keep your energy for yourself.", "Both are good instincts. The guild's never been about doing it alone, but it's not about never trusting yourself either. What feels right, this time?", ], choice:{ options:[ { label:"Face him together with Joel", effect:{gold:20,xp:20}, result:"You and Joel answer the call side by side. The Notification King's crown flickers — smaller now, watched instead of feared." }, { label:"Send Aisyah to scout it out first", effect:{gold:35,xp:8}, result:"Aisyah comes back with coin and a plan. \"Knowledge first,\" she says. \"Then you swing.\"" }, ]} }, { id:"ch6", title:"What the Chest Remembered", icon:"📦", unlockLv:11, pages:[ "Whatever you decided about that sealed chest, weeks back, it changed something small and lasting — the kind of thing only the guild notices.", "Aisyah still brings it up sometimes, unprompted, like it proved something she already suspected about you.", "Legends keeps its memory that way. Not in trophies. In the way people talk about you when you're not in the room.", "You're starting to like what they'd say.", ], reward:{gold:20,xp:20} }, { id:"ch7", title:"Frostpeak, Clear Sky", icon:"❄️", unlockLv:13, pages:[ "The climb to Frostpeak Summit is longer than it looks from the Watchtower. Senedra swore there was treasure. There wasn't — just cold air and a very long view.", "\"Still worth it though,\" she said, unbothered, already looking for the next thing to be excited about.", "You found yourself agreeing. Some places aren't about what you find. They're about what gets quiet in you once you're standing there.", "Starlight Thread grows only this high, brittle and rare. You gathered a little, mostly as an excuse to stay a while longer.", ], reward:{gold:22,xp:22} }, { id:"ch8", title:"Daybreak", icon:"🌅", unlockLv:16, pages:[ "There's no final wraith to slay. That was never really the shape of this story.", "The guild hall looks the same as it always has — Joel by the door, Aisyah counting coin she'll spend by evening, Mezstorm humming something new, Soel claiming the warmest spot without asking.", "What's different is you. Quieter mornings. Fewer scrolls you didn't mean to fall into. A streak that means something because you kept choosing it, not because you had to.", "Daybreak was never a place you'd arrive at once and stay. It's just what it's called every time you answer the Call instead of the feed. Which, lately, is most days.", ], reward:{gold:40,xp:40} }, ]; const BOUNTY_GEAR = [ { id:"bounty_ring", slot:"trinket", name:"Hunter's Signet", effect:"+3 Luck (bigger crit chance)", bonus:{luck:3}, icon:"💍" }, { id:"bounty_cloak", slot:"armor", name:"Bounty Hunter's Cloak", effect:"+45 Max HP", bonus:{hp:45}, icon:"🧥" }, { id:"bounty_blade", slot:"weapon", name:"Wraithbane Blade", effect:"+12 Attack", bonus:{atk:12}, icon:"🗡️" }, ]; const BOUNTY_GEAR_MILESTONES = [3, 7, 12]; const HIT_LIST = [ { id:"hl_wraith", icon:"🎯", target:"Scroll Wraith", goal:3, reward:{gold:25,xp:20} }, { id:"hl_imp", icon:"🎯", target:"Notification Imp", goal:2, reward:{gold:20,xp:18} }, { id:"hl_serpent", icon:"🎯", target:"Feed Serpent", goal:2, reward:{gold:22,xp:20} }, { id:"hl_specter", icon:"🎯", target:"Doubt Specter", goal:3, reward:{gold:26,xp:22} }, { id:"hl_wraithling", icon:"🎯", target:"Wraithling", goal:3, reward:{gold:18,xp:14} }, { id:"hl_gnat", icon:"🎯", target:"Notification Gnat", goal:3, reward:{gold:18,xp:14} }, { id:"hl_anymix", icon:"🎯", target:"any", goal:5, reward:{gold:30,xp:25} }, ]; const SELL_PRICES = { "Moonherb":2, "Silver Dust":2, "Ember Shard":2, "Starlight Thread":2, "Slime Gel":2, "Herbal Extract":5, "Silver Ingot":5, "Ember Core":5, "Starlight Weave":5, "Gel Solvent":5, }; const POTION_SELL = { health_draught:5, focus_elixir:6, greater_health_draught:10 }; const WEEKLY_TASK = { desc:"Answer 10 Calls this week", goal:10, reward:{gold:80,xp:60} }; const BOUNTY_POOL = [ { id:"b_skirmish2", icon:"⚔️", desc:"Defeat 2 wande k});color:white">Break the seal now (+80g +20xp)</button> <button data-act="chestChoice" data-arg="aisyah" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:linear-gradient(135deg, ${C.mage}, ${C.mageDeep});color:white">Bring it to Aisyah unopened (permanent gold bonus)</button> </div> </div>`; } function renderNav() { const tabs = [["home","🪄","Home"], ["explore","🧭","Explore"], ["party","👥","Party"], ["quests","📜","Quests"], ["craft","🔨","Craft"], ["calendar","📦","Calendar"]]; const items = tabs.map(([id,icon,label]) => ` <button data-act="setTab" data-arg="${id}" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;flex:1;color:${ui.tab===id ? C.mageDeep : C.inkSoft}"> <span style="font-size:18px">${icon}</span> <span style="font-size:11px;font-weight:${ui.tab===id?700:500}">${label}</span> </button>`).join(""); return `<div style="position:fixed;bottom:0;left:0;right:0;display:flex;background:${C.card};border-top:1px solid ${C.border}">${items}</div>`; } function renderContent() { if (ui.tab === "home") return renderHome(); if (ui.tab === "explore") return renderExplore(); if (ui.tab === "party") return renderParty(); if (ui.tab === "quests") return renderQuests(); if (ui.tab === "craft") return renderCraft(); if (ui.tab === "calendar") return renderCalendar(); return ""; } function render() { ensureDaily(); const html = ` ${renderHeader()} ${renderToast()} <div style="padding:20px 20px 96px">${renderContent()}</div> ${renderEncounterModal()} ${renderStoryModal()} ${renderSkirmishModal()} ${renderChestModal()} ${renderBackupModal()} ${renderNav()} `; document.getElementById("app").innerHTML = html; } /* ================= init ================= */ load(); render(); setInterval(() => { ui.now = Date.now(); if (!ui.showBackup) render(); }, 20000); </script> </body> </html>
